<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jumia Login</title>
    <link rel="stylesheet" href="password.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <img src="images/jumia logo.png" alt="Jumia-top-logo" />
      <h2>Welcome back!</h2>
      <h3>Log back into your Jumia account.</h3>
      <img src="images\unified-passkey-icon.png" alt="" id="pass-svg" />

      <form id="loginForm">
        <!-- Email field (pre-filled from localStorage) -->
        <input
          type="text"
          id="email"
          name="user-contact"
          placeholder="Email or Mobile Number*"
          required
        />
        <!-- Password field -->
        <input
          id="password"
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button class="login" id="logBtn" type="submit">Login</button>
      </form>

      <div style="margin: 30px 0px 0px 0px">
        <a href="forgot.html">Forgot your password?</a>
      </div>

      <div class="support">
        <h3>
          For further support, you may visit the Help Center or contact our
          customer service team.
        </h3>
      </div>
      <div class="bottom-logo">
        <img src="images/myjumia-bottom-logo.png" alt="" />
      </div>
    </div>

    <script>
      document.getElementById("email").value =
        localStorage.getItem("userEmail") || "";

      const passwordInput = document.getElementById("password");
      const logBtn = document.getElementById("logBtn");

      passwordInput.addEventListener("input", () => {
        if (passwordInput.value.length > 0) {
          logBtn.classList.add("active");
        } else {
          logBtn.classList.remove("active");
        }
      });

      // <-- login page to laptop.html --->

      const loginForm = document.getElementById("loginForm");
      const passInput = document.getElementById("password");

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault(); // stop default POST

        if (passwordInput.value.trim() !== "") {
          // redirect to product display page
          window.location.href = "laptop.html";
        } else {
          alert("Please enter your password before logging in.");
        }
      });
    </script>
  </body>
</html>
